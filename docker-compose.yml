version: "3.8"

services:
  weeks-to-live:
    build: .
    container_name: weeks-to-live
    restart: unless-stopped
    ports:
      - "0.0.0.0:${HOST_PORT:-5027}:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - TZ=${TZ:-America/New_York}
      - WEEKS_TO_LIVE_DATA_DIR=/app/data
    volumes:
      - weeks-to-live-data:/app/data
    networks:
      - lexington-network
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; assert json.load(urllib.request.urlopen('http://localhost:5000/health', timeout=5))['status'] == 'healthy'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  lexington-network:
    external: true

volumes:
  weeks-to-live-data:
