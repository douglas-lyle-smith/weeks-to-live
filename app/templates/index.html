<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weeks To Live</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=asset_version) }}">
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark">52</div>
                <div>
                    <h1>Weeks To Live</h1>
                    <p class="tagline">A calendar measured in weeks.</p>
                </div>
            </div>
            <div class="today-pill">Today: <span id="today"></span></div>
        </header>

        <section class="layout">
            <aside class="panel">
                <form class="controls" id="life-form">
                    <div class="field">
                        <label for="birthdate">Birthdate</label>
                        <input id="birthdate" name="birthdate" type="date" value="1980-09-08" required>
                    </div>
                    <div class="field">
                        <label for="life_expectancy">Life Expectancy</label>
                        <input id="life_expectancy" name="life_expectancy" type="number" min="1" max="130" step="0.1" value="78.6" required>
                    </div>
                    <button type="submit">Calculate</button>
                    <div class="error" id="error"></div>
                </form>

                <div class="stats">
                    <div class="stat">
                        <span>Death Date</span>
                        <strong id="death-date"></strong>
                    </div>
                    <div class="stat">
                        <span>Current Age</span>
                        <strong id="age"></strong>
                    </div>
                    <div class="stat">
                        <span>Weeks Lived</span>
                        <strong id="weeks-lived"></strong>
                    </div>
                    <div class="stat">
                        <span>Weeks Left</span>
                        <strong id="weeks-remaining"></strong>
                    </div>
                    <div class="stat">
                        <span>Used</span>
                        <strong id="percent-used"></strong>
                    </div>
                </div>
            </aside>

            <section class="content">
                <nav class="tabs" aria-label="Weeks To Live sections">
                    <button class="tab active" type="button" data-tab="chart">Chart</button>
                    <button class="tab" type="button" data-tab="events">Events</button>
                </nav>

                <section class="panel visual tab-panel active" id="chart-tab">
                    <div class="visual-header">
                        <h2>Life In Weeks</h2>
                        <div class="legend" aria-label="Legend">
                            <span class="legend-item"><span class="dot spent"></span> Lived</span>
                            <span class="legend-item"><span class="dot"></span> Remaining</span>
                            <span class="legend-item"><span class="dot event"></span> Event</span>
                        </div>
                    </div>
                    <div class="timeline-wrap">
                        <div class="timeline" id="timeline" aria-label="Life in weeks timeline"></div>
                    </div>
                    <div class="events" id="events"></div>
                </section>

                <section class="panel events-panel tab-panel" id="events-tab">
                    <div class="events-toolbar">
                        <button id="export-events-csv" class="secondary-button" type="button">Export CSV</button>
                        <button id="import-events-csv" class="secondary-button" type="button">Import CSV</button>
                        <input id="events-csv-file" type="file" accept=".csv,text/csv" hidden>
                    </div>
                    <form class="event-form" id="event-form">
                        <div class="field">
                            <label for="event-name">Event Name</label>
                            <input id="event-name" name="name" type="text" maxlength="140" required>
                        </div>
                        <div class="field compact-field">
                            <label for="event-age">Age</label>
                            <input id="event-age" name="age" type="number" min="0" max="130" step="0.1" required>
                        </div>
                        <div class="field">
                            <label for="event-date">Date Label</label>
                            <input id="event-date" name="date" type="text" maxlength="80" required>
                        </div>
                        <div class="field color-field">
                            <label for="event-color">Color</label>
                            <input id="event-color" name="color" type="color" value="#0f766e" required>
                        </div>
                        <div class="event-form-actions">
                            <button id="event-submit" type="submit">Add Event</button>
                            <button id="cancel-event-edit" class="secondary-button" type="button" hidden>Cancel</button>
                        </div>
                    </form>
                    <div class="editable-events" id="editable-events"></div>
                </section>
            </section>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js', v=asset_version) }}"></script>
</body>
</html>
